<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>心动 - 找回密码</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#FFF0F5', 100: '#FFD1E8', 200: '#FFA3D1', 300: '#FF75BA',
              400: '#FF4A9F', 500: '#FF4081', 600: '#E91E63', 700: '#C2185B',
              800: '#AD1457', 900: '#880E4F',
            },
            secondary: {
              50: '#F3E5F5', 100: '#E1BEE7', 200: '#CE93D8', 300: '#BA68C8',
              400: '#AB47BC', 500: '#9C27B0', 600: '#8E24AA', 700: '#7B1FA2',
              800: '#6A1B9A', 900: '#4A148C',
            },
          },
          fontFamily: { sans: ['Noto Sans SC', 'system-ui', '-apple-system', 'sans-serif'] },
        },
      },
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #FF4081 0%, #9C27B0 100%); }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .dark .glass-card {
      background: rgba(26, 26, 26, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .input-field {
      transition: all 0.3s ease;
    }
    .input-field:focus {
      box-shadow: 0 0 0 3px rgba(255, 64, 129, 0.15);
    }
    .heart-float { animation: heartFloat 3s ease-in-out infinite; }
    @keyframes heartFloat { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-8px) rotate(5deg); } }
    .pulse-ring { animation: pulseRing 2s ease-out infinite; }
    @keyframes pulseRing { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
    .fade-in-up { animation: fadeInUp 0.5s ease-out both; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .success-pop { animation: successPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    @keyframes successPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="antialiased">
  <div class="max-w-md mx-auto min-h-screen gradient-bg relative flex flex-col items-center justify-center px-6 py-8">
    
    <!-- 背景装饰 blur circles -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute top-20 left-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
      <div class="absolute bottom-32 right-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
    </div>

    <!-- 顶部返回按钮 -->
    <div class="absolute top-4 left-4 z-10">
      <button class="p-2 rounded-full bg-white/20 backdrop-blur-sm hover:bg-white/30 transition-colors">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
    </div>

    <!-- Logo 区 -->
    <div class="relative mb-6 fade-in-up" style="animation-delay: 0.1s;">
      <div class="absolute inset-0 bg-white/20 rounded-full pulse-ring"></div>
      <div class="relative w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-xl heart-float">
        <svg class="w-8 h-8 text-primary-500" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </div>
    </div>

    <h1 class="text-2xl font-bold text-white mb-1 fade-in-up" style="animation-delay: 0.2s;">找回密码</h1>
    <p class="text-white/80 text-sm mb-8 fade-in-up" style="animation-delay: 0.3s;">输入邮箱，我们将发送重置链接</p>

    <!-- 玻璃卡片 -->
    <div class="glass-card w-full rounded-3xl p-6 shadow-2xl fade-in-up" style="animation-delay: 0.4s;">
      
      <!-- 默认状态：邮箱输入 -->
      <div id="form-state" class="block">
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1.5">邮箱地址</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </div>
            <input type="email" placeholder="your@email.com" 
                   class="input-field w-full pl-10 pr-4 h-12 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:border-primary-500 dark:focus:border-primary-500">
          </div>
        </div>

        <button onclick="showSuccess()" 
                class="w-full h-12 bg-primary-500 hover:bg-primary-600 text-white font-semibold rounded-xl transition-all duration-300 shadow-lg shadow-primary-500/30 hover:shadow-primary-500/50 hover:-translate-y-0.5">
          发送重置链接
        </button>
      </div>

      <!-- 成功状态 -->
      <div id="success-state" class="hidden">
        <div class="flex flex-col items-center py-4 success-pop">
          <div class="w-16 h-16 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-1">重置邮件已发送</h3>
          <p class="text-sm text-gray-500 dark:text-gray-400 text-center">请查收邮箱，点击链接完成密码重置<br>链接有效期 30 分钟</p>
        </div>
      </div>

    </div>

    <!-- 底部返回登录 -->
    <div class="mt-6 text-center fade-in-up" style="animation-delay: 0.5s;">
      <p class="text-sm text-white/80">
        想起密码了？
        <a href="#" class="text-white font-semibold underline underline-offset-2 hover:text-white/90">返回登录</a>
      </p>
    </div>

    <p class="text-white/60 text-xs mt-8">© 2026 心动 App. All rights reserved.</p>
  </div>

  <button onclick="document.documentElement.classList.toggle('dark')" 
          class="fixed bottom-6 right-6 z-50 w-12 h-12 bg-white/20 backdrop-blur-sm text-white rounded-full shadow-lg flex items-center justify-center text-xl hover:scale-110 transition-transform border border-white/30">
    🌓
  </button>

  <script>
    function showSuccess() {
      document.getElementById('form-state').classList.add('hidden');
      document.getElementById('success-state').classList.remove('hidden');
    }
  </script>

  <style>
    @media (min-width: 640px) { body { background: #E5E7EB; } }
  </style>
</body>
</html>
