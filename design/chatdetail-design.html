<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>心动 - 聊天详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#FFF0F5', 100: '#FFD1E8', 200: '#FFA3D1', 300: '#FF75BA',
              400: '#FF4A9F', 500: '#FF4081', 600: '#E91E63', 700: '#C2185B',
              800: '#AD1457', 900: '#880E4F',
            },
            secondary: {
              50: '#F3E5F5', 100: '#E1BEE7', 200: '#CE93D8', 300: '#BA68C8',
              400: '#AB47BC', 500: '#9C27B0', 600: '#8E24AA', 700: '#7B1FA2',
              800: '#6A1B9A', 900: '#4A148C',
            },
          },
          fontFamily: { sans: ['Noto Sans SC', 'system-ui', '-apple-system', 'sans-serif'] },
        },
      },
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif; background: #F8F9FA; }
    .dark body { background: #0F0F0F; }
    .card-shadow { box-shadow: 0 2px 12px rgba(255, 64, 129, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04); }
    .dark .card-shadow { box-shadow: 0 2px 12px rgba(255, 64, 129, 0.12), 0 1px 4px rgba(0, 0, 0, 0.3); }
    .avatar-ring { background: linear-gradient(135deg, #FF4081 0%, #9C27B0 100%); padding: 2px; border-radius: 50%; }
    .bubble-right { border-radius: 16px 16px 4px 16px; }
    .bubble-left { border-radius: 16px 16px 16px 4px; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.2); } }
    .msg-in { animation: msgIn 0.25s ease-out; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="antialiased">
  <div class="max-w-md mx-auto min-h-screen bg-gray-50 dark:bg-[#0F0F0F] relative flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 dark:bg-[#1A1A1A]/80 backdrop-blur-xl border-b border-gray-100 dark:border-gray-800">
      <div class="px-4 py-3 flex items-center gap-3">
        <button class="p-1.5 -ml-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
          <svg class="w-5 h-5 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="relative">
          <div class="avatar-ring">
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop&crop=face" alt="头像" class="w-9 h-9 rounded-full object-cover border-2 border-white dark:border-[#1A1A1A]">
          </div>
          <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-green-500 rounded-full border-2 border-white dark:border-[#1A1A1A]"></div>
        </div>
        <div class="flex-1 min-w-0">
          <h2 class="text-sm font-semibold text-gray-900 dark:text-white truncate">小雅</h2>
          <p class="text-xs text-green-500">在线</p>
        </div>
        <button class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
          <svg class="w-5 h-5 text-gray-600 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 聊天内容区 -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-4 py-4 space-y-4">

      <!-- 时间分隔线 -->
      <div class="flex items-center justify-center">
        <span class="text-xs text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-800 px-3 py-1 rounded-full">今天 14:20</span>
      </div>

      <!-- 对方消息 1 -->
      <div class="flex items-end gap-2 msg-in">
        <div class="avatar-ring flex-shrink-0">
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop&crop=face" alt="头像" class="w-8 h-8 rounded-full object-cover border-2 border-white dark:border-[#0F0F0F]">
        </div>
        <div class="max-w-[75%]">
          <div class="bg-white dark:bg-[#1A1A1A] bubble-left px-3.5 py-2.5 card-shadow">
            <p class="text-sm text-gray-800 dark:text-gray-100 leading-relaxed">嗨 👋 看到你的资料，感觉我们兴趣挺相似的～</p>
          </div>
          <span class="text-[10px] text-gray-400 dark:text-gray-500 mt-1 ml-1">14:21</span>
        </div>
      </div>

      <!-- 自己消息 1 -->
      <div class="flex items-end gap-2 flex-row-reverse msg-in">
        <div class="avatar-ring flex-shrink-0">
          <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&h=100&fit=crop&crop=face" alt="头像" class="w-8 h-8 rounded-full object-cover border-2 border-white dark:border-[#0F0F0F]">
        </div>
        <div class="max-w-[75%]">
          <div class="bg-primary-500 bubble-right px-3.5 py-2.5 shadow-lg shadow-primary-500/20">
            <p class="text-sm text-white leading-relaxed">哈哈是啊！你也喜欢摄影和旅行吗？ 📸✈️</p>
          </div>
          <div class="flex items-center justify-end gap-1 mt-1 mr-1">
            <span class="text-[10px] text-gray-400 dark:text-gray-500">14:23</span>
            <svg class="w-3 h-3 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- 对方消息 2 -->
      <div class="flex items-end gap-2 msg-in">
        <div class="avatar-ring flex-shrink-0">
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop&crop=face" alt="头像" class="w-8 h-8 rounded-full object-cover border-2 border-white dark:border-[#0F0F0F]">
        </div>
        <div class="max-w-[75%]">
          <div class="bg-white dark:bg-[#1A1A1A] bubble-left px-3.5 py-2.5 card-shadow">
            <p class="text-sm text-gray-800 dark:text-gray-100 leading-relaxed">对呀！上个月刚去了云南，风景太美了～给你看看照片</p>
          </div>
          <span class="text-[10px] text-gray-400 dark:text-gray-500 mt-1 ml-1">14:24</span>
        </div>
      </div>

      <!-- 对方图片消息 -->
      <div class="flex items-end gap-2 msg-in">
        <div class="avatar-ring flex-shrink-0">
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop&crop=face" alt="头像" class="w-8 h-8 rounded-full object-cover border-2 border-white dark:border-[#0F0F0F]">
        </div>
        <div class="max-w-[70%]">
          <div class="bg-white dark:bg-[#1A1A1A] bubble-left overflow-hidden card-shadow">
            <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop" alt="分享图片" class="w-full h-40 object-cover">
          </div>
          <span class="text-[10px] text-gray-400 dark:text-gray-500 mt-1 ml-1">14:24</span>
        </div>
      </div>

      <!-- 自己消息 2 -->
      <div class="flex items-end gap-2 flex-row-reverse msg-in">
        <div class="avatar-ring flex-shrink-0">
          <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&h=100&fit=crop&crop=face" alt="头像" class="w-8 h-8 rounded-full object-cover border-2 border-white dark:border-[#0F0F0F]">
        </div>
        <div class="max-w-[75%]">
          <div class="bg-primary-500 bubble-right px-3.5 py-2.5 shadow-lg shadow-primary-500/20">
            <p class="text-sm text-white leading-relaxed">哇！这也太好看了吧 😍 是洱海吗？</p>
          </div>
          <div class="flex items-center justify-end gap-1 mt-1 mr-1">
            <span class="text-[10px] text-gray-400 dark:text-gray-500">14:26</span>
            <svg class="w-3 h-3 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- 时间分隔线 -->
      <div class="flex items-center justify-center">
        <span class="text-xs text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-800 px-3 py-1 rounded-full">今天 14:30</span>
      </div>

      <!-- 对方消息 3 -->
      <div class="flex items-end gap-2 msg-in">
        <div class="avatar-ring flex-shrink-0">
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop&crop=face" alt="头像" class="w-8 h-8 rounded-full object-cover border-2 border-white dark:border-[#0F0F0F]">
        </div>
        <div class="max-w-[75%]">
          <div class="bg-white dark:bg-[#1A1A1A] bubble-left px-3.5 py-2.5 card-shadow">
            <p class="text-sm text-gray-800 dark:text-gray-100 leading-relaxed">是的！就在洱海边上。周末有空一起喝咖啡吗？我知道一家很棒的店 ☕️</p>
          </div>
          <span class="text-[10px] text-gray-400 dark:text-gray-500 mt-1 ml-1">14:32</span>
        </div>
      </div>

      <!-- 自己消息 3 -->
      <div class="flex items-end gap-2 flex-row-reverse msg-in">
        <div class="avatar-ring flex-shrink-0">
          <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&h=100&fit=crop&crop=face" alt="头像" class="w-8 h-8 rounded-full object-cover border-2 border-white dark:border-[#0F0F0F]">
        </div>
        <div class="max-w-[75%]">
          <div class="bg-primary-500 bubble-right px-3.5 py-2.5 shadow-lg shadow-primary-500/20">
            <p class="text-sm text-white leading-relaxed">好呀！周六下午可以吗？😊</p>
          </div>
          <div class="flex items-center justify-end gap-1 mt-1 mr-1">
            <span class="text-[10px] text-gray-400 dark:text-gray-500">14:35</span>
            <svg class="w-3 h-3 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- 底部占位 -->
      <div class="h-2"></div>
    </main>

    <!-- 输入区 -->
    <div class="sticky bottom-0 z-40 bg-white/90 dark:bg-[#1A1A1A]/90 backdrop-blur-xl border-t border-gray-100 dark:border-gray-800 px-4 py-3">
      <div class="flex items-center gap-2">
        <button class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex-shrink-0">
          <svg class="w-5 h-5 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </button>
        <div class="flex-1 relative">
          <input type="text" placeholder="输入消息..." class="w-full bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white text-sm px-4 py-2.5 rounded-full focus:outline-none focus:ring-2 focus:ring-primary-500/50 placeholder-gray-400 dark:placeholder-gray-500">
        </div>
        <button class="p-2.5 rounded-full bg-primary-500 hover:bg-primary-600 transition-colors flex-shrink-0 shadow-lg shadow-primary-500/30">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <button onclick="document.documentElement.classList.toggle('dark')" class="fixed bottom-24 right-4 z-50 w-12 h-12 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-full shadow-lg flex items-center justify-center text-xl hover:scale-110 transition-transform">🌓</button>

  <style>
    .h-safe-area-inset-bottom { height: env(safe-area-inset-bottom, 0px); }
    @media (min-width: 640px) { body { background: #E5E7EB; } .dark body { background: #111827; } }
  </style>
</body>
</html>
