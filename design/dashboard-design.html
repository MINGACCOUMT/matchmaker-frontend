<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>心动 - 首页 Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#FFF0F5', 100: '#FFD1E8', 200: '#FFA3D1', 300: '#FF75BA',
              400: '#FF4A9F', 500: '#FF4081', 600: '#E91E63', 700: '#C2185B',
              800: '#AD1457', 900: '#880E4F',
            },
            secondary: {
              50: '#F3E5F5', 100: '#E1BEE7', 200: '#CE93D8', 300: '#BA68C8',
              400: '#AB47BC', 500: '#9C27B0', 600: '#8E24AA', 700: '#7B1FA2',
              800: '#6A1B9A', 900: '#4A148C',
            },
          },
          fontFamily: { sans: ['Noto Sans SC', 'system-ui', '-apple-system', 'sans-serif'] },
        },
      },
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif; background: #F8F9FA; }
    .dark body { background: #0F0F0F; }
    .card-shadow { box-shadow: 0 2px 12px rgba(255, 64, 129, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04); }
    .dark .card-shadow { box-shadow: 0 2px 12px rgba(255, 64, 129, 0.12), 0 1px 4px rgba(0, 0, 0, 0.3); }
    .avatar-ring { background: linear-gradient(135deg, #FF4081 0%, #9C27B0 100%); padding: 2px; border-radius: 50%; }
    .header-gradient { background: linear-gradient(135deg, rgba(255,64,129,0.08) 0%, rgba(156,39,176,0.06) 50%, rgba(255,255,255,0) 100%); }
    .dark .header-gradient { background: linear-gradient(135deg, rgba(255,64,129,0.15) 0%, rgba(156,39,176,0.10) 50%, rgba(0,0,0,0) 100%); }
    .quick-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
    .quick-btn:hover { transform: translateY(-4px); }
    .quick-btn:active { transform: scale(0.95); }
    .quick-icon { box-shadow: 0 8px 20px rgba(0,0,0,0.15), 0 2px 6px rgba(0,0,0,0.1); transition: all 0.3s ease; }
    .quick-btn:hover .quick-icon { box-shadow: 0 12px 28px rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.15); transform: scale(1.08); }
    .stat-card { transition: all 0.3s ease; position: relative; overflow: hidden; }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(255, 64, 129, 0.15); }
    .stat-card::after { content: ''; position: absolute; top: -50%; right: -50%; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,64,129,0.06) 0%, transparent 70%); opacity: 0; transition: opacity 0.3s ease; }
    .stat-card:hover::after { opacity: 1; }
    .recommend-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .recommend-card:hover { transform: scale(1.03); box-shadow: 0 12px 32px rgba(255, 64, 129, 0.2); }
    .match-score-badge { background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); }
    .dark .match-score-badge { background: rgba(0,0,0,0.7); }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.3); } }
    .heart-float { animation: heartFloat 3s ease-in-out infinite; }
    @keyframes heartFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .ring-progress { transform: rotate(-90deg); }
    .urgency-glow { animation: urgencyGlow 2s ease-in-out infinite; }
    @keyframes urgencyGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,64,129,0.4); } 50% { box-shadow: 0 0 0 8px rgba(255,64,129,0); } }
    .slide-in { animation: slideIn 0.5s ease-out both; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .stagger-1 { animation-delay: 0.08s; }
    .stagger-2 { animation-delay: 0.16s; }
    .stagger-3 { animation-delay: 0.24s; }
    .stagger-4 { animation-delay: 0.32s; }
    .stagger-5 { animation-delay: 0.40s; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="antialiased">
  <div class="max-w-md mx-auto min-h-screen bg-gray-50 dark:bg-[#0F0F0F] relative pb-20">

    <!-- 顶部 Header -->
    <header class="sticky top-0 z-50 header-gradient border-b border-gray-100/50 dark:border-gray-800/50">
      <div class="px-4 py-3 flex items-center justify-between backdrop-blur-xl bg-white/60 dark:bg-[#1A1A1A]/60">
        <div class="flex items-center gap-3">
          <div class="relative">
            <div class="avatar-ring">
              <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&h=100&fit=crop&crop=face" 
                   alt="用户头像" 
                   class="w-11 h-11 rounded-full object-cover border-2 border-white dark:border-[#1A1A1A]">
            </div>
            <div class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-green-500 rounded-full border-2 border-white dark:border-[#1A1A1A]"></div>
          </div>
          <div>
            <p class="text-xs text-gray-500 dark:text-gray-400">Welcome back</p>
            <h1 class="text-base font-bold text-gray-900 dark:text-white">Hi, 小雨</h1>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <button class="relative p-2.5 rounded-full bg-white/80 dark:bg-[#2A2A2A]/80 shadow-sm hover:shadow-md transition-all">
            <svg class="w-5 h-5 text-gray-700 dark:text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
            <span class="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-primary-500 rounded-full pulse-dot"></span>
          </button>
        </div>
      </div>
    </header>

    <!-- 主体内容 -->
    <main class="px-4 pt-4 space-y-5">
      
      <!-- 快速入口区 -->
      <section class="slide-in">
        <div class="grid grid-cols-4 gap-3">
          <button class="quick-btn flex flex-col items-center gap-2 p-2 rounded-2xl bg-white dark:bg-[#1A1A1A] card-shadow">
            <div class="quick-icon w-14 h-14 rounded-2xl bg-gradient-to-br from-[#FF6B9D] to-[#FF4081] flex items-center justify-center">
              <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
              </svg>
            </div>
            <span class="text-[11px] font-semibold text-gray-700 dark:text-gray-200">每日推荐</span>
          </button>
          
          <button class="quick-btn flex flex-col items-center gap-2 p-2 rounded-2xl bg-white dark:bg-[#1A1A1A] card-shadow">
            <div class="quick-icon w-14 h-14 rounded-2xl bg-gradient-to-br from-[#AB47BC] to-[#9C27B0] flex items-center justify-center">
              <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-4 0 2.5 2.5 0 014 0zM12 10a2.5 2.5 0 11-4 0 2.5 2.5 0 014 0z"/>
              </svg>
            </div>
            <span class="text-[11px] font-semibold text-gray-700 dark:text-gray-200">我的匹配</span>
          </button>
          
          <button class="quick-btn flex flex-col items-center gap-2 p-2 rounded-2xl bg-white dark:bg-[#1A1A1A] card-shadow">
            <div class="quick-icon w-14 h-14 rounded-2xl bg-gradient-to-br from-[#FFB74D] to-[#F97316] flex items-center justify-center">
              <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
              </svg>
            </div>
            <span class="text-[11px] font-semibold text-gray-700 dark:text-gray-200">消息中心</span>
          </button>
          
          <button class="quick-btn flex flex-col items-center gap-2 p-2 rounded-2xl bg-white dark:bg-[#1A1A1A] card-shadow">
            <div class="quick-icon w-14 h-14 rounded-2xl bg-gradient-to-br from-[#4DB6AC] to-[#14B8A6] flex items-center justify-center">
              <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
            <span class="text-[11px] font-semibold text-gray-700 dark:text-gray-200">完善资料</span>
          </button>
        </div>
      </section>

      <!-- 统计数据区 -->
      <section class="slide-in stagger-1">
        <div class="grid grid-cols-3 gap-3">
          <!-- 今日浏览 -->
          <div class="stat-card bg-white dark:bg-[#1A1A1A] rounded-2xl p-4 card-shadow">
            <div class="flex items-center justify-between mb-3">
              <div class="w-9 h-9 rounded-xl bg-sky-50 dark:bg-sky-900/30 flex items-center justify-center">
                <svg class="w-5 h-5 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </div>
              <span class="text-[10px] font-bold text-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 px-1.5 py-0.5 rounded-full">+12%</span>
            </div>
            <div class="flex items-end gap-2">
              <span class="text-2xl font-extrabold text-gray-900 dark:text-white">128</span>
              <svg class="w-8 h-8 text-sky-200 dark:text-sky-800 flex-shrink-0 mb-0.5" viewBox="0 0 36 36">
                <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="3" opacity="0.3"/>
                <circle cx="18" cy="18" r="16" fill="none" stroke="#0EA5E9" stroke-width="3" stroke-dasharray="75 100" stroke-linecap="round" class="ring-progress"/>
              </svg>
            </div>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">今日浏览</p>
          </div>
          
          <!-- 新匹配 -->
          <div class="stat-card bg-white dark:bg-[#1A1A1A] rounded-2xl p-4 card-shadow">
            <div class="flex items-center justify-between mb-3">
              <div class="w-9 h-9 rounded-xl bg-primary-50 dark:bg-primary-900/30 flex items-center justify-center">
                <svg class="w-5 h-5 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
              </div>
              <span class="text-[10px] font-bold text-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 px-1.5 py-0.5 rounded-full">+5%</span>
            </div>
            <div class="flex items-end gap-2">
              <span class="text-2xl font-extrabold text-gray-900 dark:text-white">24</span>
              <svg class="w-8 h-8 text-primary-200 dark:text-primary-800 flex-shrink-0 mb-0.5" viewBox="0 0 36 36">
                <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="3" opacity="0.3"/>
                <circle cx="18" cy="18" r="16" fill="none" stroke="#FF4081" stroke-width="3" stroke-dasharray="60 100" stroke-linecap="round" class="ring-progress"/>
              </svg>
            </div>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">新匹配</p>
          </div>
          
          <!-- 未读消息 -->
          <div class="stat-card bg-white dark:bg-[#1A1A1A] rounded-2xl p-4 card-shadow">
            <div class="flex items-center justify-between mb-3">
              <div class="w-9 h-9 rounded-xl bg-orange-50 dark:bg-orange-900/30 flex items-center justify-center">
                <svg class="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                </svg>
              </div>
              <span class="text-[10px] font-bold text-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 px-1.5 py-0.5 rounded-full">+3%</span>
            </div>
            <div class="flex items-end gap-2">
              <span class="text-2xl font-extrabold text-gray-900 dark:text-white">8</span>
              <svg class="w-8 h-8 text-orange-200 dark:text-orange-800 flex-shrink-0 mb-0.5" viewBox="0 0 36 36">
                <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="3" opacity="0.3"/>
                <circle cx="18" cy="18" r="16" fill="none" stroke="#F97316" stroke-width="3" stroke-dasharray="40 100" stroke-linecap="round" class="ring-progress"/>
              </svg>
            </div>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">未读消息</p>
          </div>
        </div>
      </section>

      <!-- 每日推荐区 -->
      <section class="slide-in stagger-2">
        <div class="flex items-center justify-between mb-3 px-1">
          <div class="flex items-center gap-2">
            <h2 class="text-lg font-bold text-gray-900 dark:text-white">每日推荐</h2>
            <span class="heart-float text-lg">💕</span>
          </div>
          <button class="text-sm text-primary-500 font-semibold flex items-center gap-0.5 hover:text-primary-600 transition-colors">
            查看更多
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
        
        <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-2">
          <!-- 推荐卡片 1 -->
          <div class="recommend-card flex-shrink-0 w-[210px] bg-white dark:bg-[#1A1A1A] rounded-2xl overflow-hidden card-shadow">
            <div class="relative h-[260px]">
              <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&h=520&fit=crop&crop=face" 
                   alt="推荐用户" 
                   class="w-full h-full object-cover">
              <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent"></div>
              <div class="absolute top-3 right-3 match-score-badge px-2.5 py-1 rounded-full">
                <span class="text-xs font-bold text-primary-500">98% 匹配</span>
              </div>
              <div class="absolute bottom-3 left-3 right-3">
                <div class="flex items-center gap-2 mb-1">
                  <h3 class="text-white font-bold text-lg">小雅</h3>
                  <span class="bg-primary-500 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold">VIP</span>
                </div>
                <p class="text-white/80 text-xs">25岁 · 北京</p>
              </div>
            </div>
            <div class="p-3 flex items-center justify-between">
              <div class="flex gap-1.5">
                <span class="text-[10px] px-2 py-1 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-full font-medium">摄影</span>
                <span class="text-[10px] px-2 py-1 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-full font-medium">旅行</span>
              </div>
              <button class="w-9 h-9 rounded-full bg-primary-500 hover:bg-primary-600 flex items-center justify-center transition-colors shadow-lg shadow-primary-500/30">
                <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
              </button>
            </div>
          </div>
          
          <!-- 推荐卡片 2 -->
          <div class="recommend-card flex-shrink-0 w-[210px] bg-white dark:bg-[#1A1A1A] rounded-2xl overflow-hidden card-shadow">
            <div class="relative h-[260px]">
              <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=520&fit=crop&crop=face" 
                   alt="推荐用户" 
                   class="w-full h-full object-cover">
              <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent"></div>
              <div class="absolute top-3 right-3 match-score-badge px-2.5 py-1 rounded-full">
                <span class="text-xs font-bold text-primary-500">95% 匹配</span>
              </div>
              <div class="absolute bottom-3 left-3 right-3">
                <div class="flex items-center gap-2 mb-1">
                  <h3 class="text-white font-bold text-lg">浩然</h3>
                  <span class="bg-green-500 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold">在线</span>
                </div>
                <p class="text-white/80 text-xs">28岁 · 上海</p>
              </div>
            </div>
            <div class="p-3 flex items-center justify-between">
              <div class="flex gap-1.5">
                <span class="text-[10px] px-2 py-1 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-full font-medium">绘画</span>
                <span class="text-[10px] px-2 py-1 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-full font-medium">瑜伽</span>
              </div>
              <button class="w-9 h-9 rounded-full bg-primary-50 dark:bg-primary-900/30 hover:bg-primary-500 flex items-center justify-center transition-colors">
                <svg class="w-4 h-4 text-primary-500 hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
              </button>
            </div>
          </div>
          
          <!-- 推荐卡片 3 -->
          <div class="recommend-card flex-shrink-0 w-[210px] bg-white dark:bg-[#1A1A1A] rounded-2xl overflow-hidden card-shadow">
            <div class="relative h-[260px]">
              <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&h=520&fit=crop&crop=face" 
                   alt="推荐用户" 
                   class="w-full h-full object-cover">
              <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent"></div>
              <div class="absolute top-3 right-3 match-score-badge px-2.5 py-1 rounded-full">
                <span class="text-xs font-bold text-primary-500">92% 匹配</span>
              </div>
              <div class="absolute bottom-3 left-3 right-3">
                <div class="flex items-center gap-2 mb-1">
                  <h3 class="text-white font-bold text-lg">思琪</h3>
                </div>
                <p class="text-white/80 text-xs">26岁 · 广州</p>
              </div>
            </div>
            <div class="p-3 flex items-center justify-between">
              <div class="flex gap-1.5">
                <span class="text-[10px] px-2 py-1 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-full font-medium">音乐</span>
                <span class="text-[10px] px-2 py-1 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-full font-medium">咖啡</span>
              </div>
              <button class="w-9 h-9 rounded-full bg-primary-50 dark:bg-primary-900/30 hover:bg-primary-500 flex items-center justify-center transition-colors">
                <svg class="w-4 h-4 text-primary-500 hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- 最近匹配区 -->
      <section class="slide-in stagger-3">
        <div class="flex items-center justify-between mb-3 px-1">
          <div class="flex items-center gap-2">
